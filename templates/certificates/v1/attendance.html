<!doctype html><html lang="es"><meta charset="utf-8"><title>Certificado de Asistencia</title>
<body style="font-family:Arial,sans-serif;padding:40px;max-width:900px;margin:0 auto;border:4px solid #0f3a8c;">
<h1>Certificado de Asistencia</h1>
<p>Se certifica que <strong>{{participant_name}}</strong> participó en el foro <strong>{{forum_code}} - {{forum_title}}</strong>.</p>
<p>Emitido el {{date_issued}}.</p>
<img alt="firma participante" src="{{signature_data_url}}" style="max-width:240px;display:block;margin-top:24px;">
<p><strong>{{director_name}}</strong></p>
<img alt="firma dirección" src="{{director_signature}}" style="max-width:240px;display:block;">
</body></html>
